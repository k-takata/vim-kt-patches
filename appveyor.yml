version: 1.0.{build}

environment:
  matrix:
  - ARCH: x64
    PYTHON2_DIR: C:\Python27-x64
    PYTHON3_DIR: C:\Python34-x64
  - ARCH: x86
    PYTHON2_DIR: C:\Python27
    PYTHON3_DIR: C:\Python34

install:
- cmd: |-
    "C:\Program Files\Microsoft SDKs\Windows\v7.1\Bin\SetEnv.cmd" /%ARCH% /release
    rem Work around for Python 2.7.11's bug
    reg copy HKLM\SOFTWARE\Python\PythonCore\2.7 HKLM\SOFTWARE\Python\PythonCore\2.7-32 /s /reg:32
    reg copy HKLM\SOFTWARE\Python\PythonCore\2.7 HKLM\SOFTWARE\Python\PythonCore\2.7-32 /s /reg:64

build_script:
- cmd: |-
    cd ..
    hg clone https://bitbucket.org/vim-mirror/vim
    cd vim
    rem Show the recent commits in the Vim repository
    hg log -v -r -1:-4
    cd .hg
    mkdir patches
    xcopy /s ..\..\vim-ktakata-mq patches > nul
    cd ..\src
    rem Apply all patches
    hg --config extensions.mq= --config "ui.username=%USERNAME% <%USERNAME%@%USERDOMAIN%>" qpush -a
    rem Suppress progress animation
    sed -e "s/\$(LINKARGS2)/\$(LINKARGS2) | sed -e 's#.*\\\\r.*##'/" Make_mvc.mak > Make_mvc2.mak
    rem Build gvim
    nmake -f Make_mvc2.mak GUI=yes OLE=yes DIRECTX=yes PYTHON_VER=27 DYNAMIC_PYTHON=yes PYTHON=%PYTHON2_DIR% PYTHON3_VER=34 DYNAMIC_PYTHON3=yes PYTHON3=%PYTHON3_DIR%
    rem Build vim
    nmake -f Make_mvc2.mak GUI=no PYTHON_VER=27 DYNAMIC_PYTHON=yes PYTHON=%PYTHON2_DIR% PYTHON3_VER=34 DYNAMIC_PYTHON3=yes PYTHON3=%PYTHON3_DIR%
    rem Show gvim version
    start /wait .\gvim -silent -register
    start /wait .\gvim -u NONE -c "redir @a | ver | 0put a | wq!" ver.txt
    type ver.txt
    rem Print interface versions
    start /wait .\gvim -S ..\.hg\patches\scripts\if_ver.vim -c quit
    type if_ver.txt
    rem Show vim version
    .\vim --version
    rem Print interface versions
    .\vim --not-a-term -S ..\.hg\patches\scripts\if_ver.vim -c quit
    type if_ver.txt

test_script:
- cmd: |-
    cd \projects\vim\src\testdir
    rem Testing with MSVC gvim
    nmake -f Make_dos.mak VIMPROG=..\gvim
    nmake -f Make_dos.mak clean
    rem Testing with MSVC vim
    nmake -f Make_dos.mak VIMPROG=..\vim

